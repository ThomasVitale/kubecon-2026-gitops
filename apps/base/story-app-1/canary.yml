---
apiVersion: flagger.app/v1beta1
kind: Canary
metadata:
  name: story-app-1
spec:
  provider: knative
  targetRef:
    apiVersion: serving.knative.dev/v1
    kind: Service
    name: story-app-1
  progressDeadlineSeconds: 3600
  analysis:
    interval: 30s       # check every 30 s — full rollout ≈ 5 min, visible on screen
    threshold: 5        # 5 consecutive failures = 150 s (2.5 min) before rollback
    stepWeight: 10      # +10% per successful check
    maxWeight: 100
    metrics:
      - name: satisfaction-score-rate-1
        templateRef:
          name: satisfaction-score-rate-1
          namespace: apps
        thresholdRange:
          min: 5        # canary must be ≥5pp better than primary to advance
        interval: 1m    # 1-minute rate window — captures audience vote burst quickly
