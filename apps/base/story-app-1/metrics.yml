---
apiVersion: flagger.app/v1beta1
kind: MetricTemplate
metadata:
  name: satisfaction-score-rate-1
spec:
  provider:
    type: prometheus
    address: http://prometheus-prometheus.observability:9090
  query: |
    (
      sum(rate(gen_ai_calls_total{
        span_name="evaluate UserSatisfaction",
        story_name="story-app-1b",
        gen_ai_evaluation_score_label="thumbs_up"
      }[{{ interval }}]))
      /
      (sum(rate(gen_ai_calls_total{
        span_name="evaluate UserSatisfaction",
        story_name="story-app-1b"
      }[{{ interval }}])) > 0)
      -
      sum(rate(gen_ai_calls_total{
        span_name="evaluate UserSatisfaction",
        story_name="story-app-1a",
        gen_ai_evaluation_score_label="thumbs_up"
      }[{{ interval }}]))
      /
      (sum(rate(gen_ai_calls_total{
        span_name="evaluate UserSatisfaction",
        story_name="story-app-1a"
      }[{{ interval }}])) > 0)
    ) * 100
    or on() vector(0)
    # vector(0): when no canary data exists (no votes yet), return 0.
    # Since 0 < min:5, each check fails and the failure counter increments.
    # With threshold:5 and interval:30s, Flagger waits 150s (2.5 min) before
    # rolling back — enough time for the audience to start voting.
    # The {{ interval }} placeholder is substituted with the metric interval
    # defined in canary.yml (currently 1m). The canary only advances when the
    # audience actively prefers it over the primary.
