---
apiVersion: flagger.app/v1beta1
kind: Canary
metadata:
  name: story-app-2
spec:
  provider: knative
  targetRef:
    apiVersion: serving.knative.dev/v1
    kind: Service
    name: story-app-2
  progressDeadlineSeconds: 3600
  analysis:
    interval: 30s       # check every 30 s — full rollout ≈ 5 min, visible on screen
    threshold: 10       # 10 consecutive failures = 300 s (5 min) before rollback
                        # mirrors the promotion time — the canary gets the same
                        # amount of time to prove itself as it takes to be promoted.
                        # cold-start failures (2–3 checks with no votes yet) are
                        # a small fraction of the budget, not half of it.
    stepWeights: [20, 30, 40, 50, 60, 70, 80, 90, 100]
                        # custom weight ladder: start at 20% (not 10%) so the canary
                        # gets twice as many initial users → metric fills faster,
                        # fewer cold-start vector(0) failures.
                        # 9 steps × 30s = 4.5 min for full promotion.
    metrics:
      - name: satisfaction-score-rate-2
        templateRef:
          name: satisfaction-score-rate-2
          namespace: apps
        thresholdRange:
          min: 5        # canary must be ≥5pp better than primary to advance
        interval: 2m    # 2-minute rate window — burst votes stay relevant for 2 min.
                        # with 1m, the initial audience voting burst aged out of the
                        # window after ~60s, causing false failures mid-rollout even
                        # though the audience had genuinely preferred the canary.
